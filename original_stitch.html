    /* Smooth transitions for the split screen expansion */
    .split-panel {
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .panel-container:hover .split-panel {
      width: 30%;
    }
    .panel-container .split-panel:hover {
      width: 70%;
    }
    /* Mobile fallback: Stack vertically */
    @media (max-width: 768px) {
      .panel-container {
        flex-direction: column;
      }
      .split-panel {
        width: 100% !important;
        height: 50vh;
      }
    }
    /* Overlay effects for text readability */
    .text-overlay {
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
